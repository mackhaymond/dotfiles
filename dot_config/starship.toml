format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
${custom.chezmoi}\
$cmd_duration\
${env_var.STARSHIP_JOBS_STOPPED}\
${env_var.STARSHIP_JOBS_RUNNING}\
$line_break\
$python\
$character"""

[directory]
style = "blue"
truncate_to_repo = false
truncation_symbol = "../"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style) "
style = "cyan"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"

# Shell job indicators. The env vars are maintained by the
# `_starship_jobs_state` precmd hook in ~/.zshrc, which reads zsh's
# $jobstates assoc array (no fork, no I/O). Modules render only when the
# corresponding var is set & non-empty; precmd unsets them when count is 0.
#   ⏸ = stopped jobs (Ctrl+Z'd — forgotten vim/less/htop). Red = attention.
#   ⚙ = running background jobs (`cmd &`). Cyan = informational.
[env_var.STARSHIP_JOBS_STOPPED]
description = "Suspended (Ctrl+Z'd) jobs — set by zsh precmd from $jobstates."
format = "[⏸ $env_value]($style) "
style = "bold red"

[env_var.STARSHIP_JOBS_RUNNING]
description = "Running background (&) jobs — set by zsh precmd from $jobstates."
format = "[⚙ $env_value]($style) "
style = "bold cyan"

[custom.chezmoi]
description = "chezmoi drift indicator (background cache, refreshed by zsh precmd). Pure-style glyphs: ~ live drift, * uncommitted, ⇡ ahead, ⇣ behind, ? fetch >24h stale."
command = "cat $HOME/.cache/chezmoi-drift/state 2>/dev/null"
when = "test -s $HOME/.cache/chezmoi-drift/state"
format = "[ ⚠ chezmoi:$output]($style) "
style = "bold red"
shell = ["sh", "--norc", "--noprofile"]
