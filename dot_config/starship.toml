format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
${custom.chezmoi}\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "blue"
truncate_to_repo = false
truncation_symbol = "../"

[character]
success_symbol = "[‚ùØ](purple)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style) "
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"

[custom.chezmoi]
description = "chezmoi drift indicator (background cache, refreshed by zsh precmd)"
command = "cat $HOME/.cache/chezmoi-drift/state 2>/dev/null"
when = "test -s $HOME/.cache/chezmoi-drift/state"
format = "[ ‚öÝ chezmoi drift]($style) "
style = "bold red"
shell = ["sh", "--norc", "--noprofile"]
